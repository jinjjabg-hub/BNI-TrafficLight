<script>
// ── 상태 ──────────────────────────────────────
let MONTHLY = {};      // { '2025-10': [{name, P, A, ...}], ... }
let MONTHS = [];       // 정렬된 월 목록 ['2025-10', '2025-11', ...]
let MEMBERS = [];      // 현재 활동 멤버 이름 목록
let curFilter = 'all';
let selMember = null;
let selPredictEnd = null; // 예측 종료 월 (null=현재)

// ── 수요일 계산 ────────────────────────────────
function countWed(year, month) {
  let c = 0, d = new Date(year, month-1, 1);
  while(d.getMonth() === month-1) { if(d.getDay()===3) c++; d.setDate(d.getDate()+1); }
  return c;
}

function parseYM(str) {
  const m = str.match(/(\d{4})[.\-_](\d{1,2})/);
  if(!m) return null;
  return { year: parseInt(m[1]), month: parseInt(m[2]), key: str };
}

// ── 파일 처리 ──────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if(f) readExcel(f);
}
function handleFile(inp) { const f=inp.files[0]; if(f) readExcel(f); inp.value=''; }

function readExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      processWorkbook(wb);
    } catch(err) { showToast('❌ 파일 오류: '+err.message, 'err'); }
  };
  reader.readAsArrayBuffer(file);
}

function processWorkbook(wb) {
  MONTHLY = {};
  MONTHS = [];

  wb.SheetNames.forEach(name => {
    const ym = parseYM(name);
    if(!ym) return;

    const ws = wb.Sheets[name];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:0});

    // 헤더 행 찾기
    let hRow = 0;
    for(let i=0; i<Math.min(rows.length,8); i++) {
      if(rows[i].some(v=>v&&(String(v).includes('멤버')||String(v).includes('이름')||String(v).includes('First')))) {
        hRow = i; break;
      }
    }
    const hd = rows[hRow].map(v=>String(v||'').trim());
    const idx = {
      name: hd.findIndex(h=>h.includes('멤버명')||h.includes('이름')||h.includes('First')),
      P: hd.findIndex(h=>h.includes('P 출석')||h==='P'),
      A: hd.findIndex(h=>h.includes('A 결석')||h==='A'),
      L: hd.findIndex(h=>h.includes('L 지각')||h==='L'),
      M: hd.findIndex(h=>h.includes('M 병가')||h==='M'),
      S: hd.findIndex(h=>h.includes('S 대리')||h==='S'),
      RGI: hd.findIndex(h=>h.includes('RGI')),
      RGO: hd.findIndex(h=>h.includes('RGO')),
      V: hd.findIndex(h=>h.includes('V 비지터')||h==='V'),
      M121: hd.findIndex(h=>h.includes('121 원투원')||h.includes('121')),
      N: hd.findIndex(h=>h.includes('감사장')||h.includes('Value of Business')),
      O: hd.findIndex(h=>h.includes('교육참가')||h.includes('Training')),
    };

    const members = [];
    for(let r=hRow+1; r<rows.length; r++) {
      const row = rows[r];
      const raw = row[idx.name];
      if(!raw || String(raw).trim()==='0') continue;
      const kor = String(raw).split(' ')[0].trim();
      if(kor.length < 2) continue;
      members.push({
        name: kor, fullName: String(raw).trim(),
        P:n(row[idx.P]), A:n(row[idx.A]), L:n(row[idx.L]),
        M:n(row[idx.M]), S:n(row[idx.S]),
        RGI:n(row[idx.RGI]), RGO:n(row[idx.RGO]),
        V:n(row[idx.V]), M121:n(row[idx.M121]),
        N:n(row[idx.N]), O:n(row[idx.O]),
      });
    }

    if(members.length > 0) {
      MONTHLY[`${ym.year}-${String(ym.month).padStart(2,'0')}`] = {
        year: ym.year, month: ym.month, members
      };
    }
  });

  MONTHS = Object.keys(MONTHLY).sort();
  if(!MONTHS.length) { showToast('❌ 유효한 월별 시트를 찾을 수 없어요 (시트명: 2025-10 형식)', 'err'); return; }

  // 현재 활동 멤버 = 가장 최신 시트 기준
  const lastMonth = MONTHLY[MONTHS[MONTHS.length-1]];
  MEMBERS = lastMonth.members.map(m=>m.name);

  document.getElementById('upload-zone').style.display='none';
  document.getElementById('data-bar').style.display='flex';
  document.getElementById('panel-view').style.display='block';

  updateDataBar();
  renderStats();
  renderTable();
  renderChips();
  showToast(`✅ ${MONTHS.length}개월 / ${MEMBERS.length}명 로드 완료!`, 'ok');
}

// ── 핵심: 롤링 6개월 집계 ─────────────────────
// startKey~endKey 범위의 데이터를 멤버별로 합산
function aggregate(memberName, startKey, endKey) {
  const result = { P:0, A:0, L:0, M:0, S:0, RGI:0, RGO:0, V:0, M121:0, N:0, O:0, totalWeeks:0, months:[] };

  const keys = MONTHS.filter(k => k >= startKey && k <= endKey);
  keys.forEach(k => {
    const md = MONTHLY[k];
    const m = md.members.find(x=>x.name===memberName);
    if(!m) return; // 해당 월에 없으면 skip (탈퇴 또는 미가입)
    result.P   += m.P;
    result.A   += m.A;
    result.L   += m.L;
    result.M   += m.M;
    result.S   += m.S;
    result.RGI += m.RGI;
    result.RGO += m.RGO;
    result.V   += m.V;
    result.M121+= m.M121;
    result.N   += m.N;
    result.O   += m.O;
    result.months.push(k);
  });

  // 총 주수 = 각 월의 수요일 수 합산
  result.totalWeeks = result.months.reduce((s, k) => {
    const md = MONTHLY[k];
    return s + countWed(md.year, md.month);
  }, 0);

  // 현재 진행중인 달(마지막 달) 주수 자동 감지
  // 전체 멤버의 출석+결석+지각+병가+대리 최빈값
  if(keys.length > 0) {
    const lastKey = keys[keys.length-1];
    const lastMd = MONTHLY[lastKey];
    const totals = lastMd.members.map(m=>m.P+m.A+m.L+m.M+m.S).filter(v=>v>0);
    if(totals.length > 0) {
      const freq = {};
      totals.forEach(v=>freq[v]=(freq[v]||0)+1);
      const actualWeeks = parseInt(Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0]);
      const fullWeeks = countWed(lastMd.year, lastMd.month);
      result.remainWeeks = fullWeeks - actualWeeks; // 남은 주수
      result.actualWeeks = actualWeeks;
      result.lastMonthFull = fullWeeks;
      result.lastKey = lastKey;
    }
  }

  return result;
}

// ── 점수 계산 ──────────────────────────────────
function calcScore(agg, extraWeeks=0) {
  const tot = agg.P + agg.A + agg.L + agg.M + agg.S + extraWeeks;
  if(tot===0) return {total:0, bd:{abs:0,time:0,ref:0,tyfcb:0,vis:0,otwone:0,train:0}, rates:{rW:0,vW:0,oW:0}, tot};
  const ref = agg.RGI+agg.RGO;
  const rW=ref/tot, vW=agg.V/tot, oW=agg.M121/tot;
  const abs    = agg.A>2?0:agg.A===2?5:agg.A===1?10:15;
  const time   = agg.L>=2?0:agg.L===1?5:10;
  const refPt  = rW<0.5?0:rW<0.75?5:rW<1?10:rW<1.2?15:20;
  const tyfcb  = agg.N<25000000?0:agg.N<50000000?5:agg.N<100000000?10:15;
  const visPt  = vW<0.1?0:vW<0.2?5:vW<0.4?10:vW<0.6?15:20;
  const oPt    = oW<1?0:oW<2?5:10;
  const trPt   = agg.O<10?0:agg.O<20?5:10;
  return {total:abs+time+refPt+tyfcb+visPt+oPt+trPt, bd:{abs,time,ref:refPt,tyfcb,vis:visPt,otwone:oPt,train:trPt}, rates:{rW,vW,oW}, tot};
}

function getLight(s) { return s>=70?'Green':s>=50?'Amber':s>=30?'Red':'Grey'; }
function lkor(l) { return {Green:'🟢 그린',Amber:'🟡 앰버',Red:'🔴 레드',Grey:'⬛ 그레이'}[l]; }
function lcolor(l) { return {Green:'var(--green)',Amber:'var(--amber)',Red:'var(--red)',Grey:'var(--grey)'}[l]; }
function won(n) { if(!n||n===0) return '0원'; return n.toLocaleString('ko-KR')+'원'; }
function n(v) { const x=parseFloat(String(v||0).replace(/,/g,'')); return isNaN(x)?0:Math.round(x); }

// 현재 기준 집계 (롤링 6개월)
function getCurrentAgg(name) {
  const last = MONTHS[MONTHS.length-1];
  const lastIdx = MONTHS.indexOf(last);
  const startIdx = Math.max(0, lastIdx-5);
  return aggregate(name, MONTHS[startIdx], last);
}

// ── 데이터바 업데이트 ──────────────────────────
function updateDataBar() {
  const last = MONTHS[MONTHS.length-1];
  const lastMd = MONTHLY[last];
  document.getElementById('data-bar-info').innerHTML =
    `<b>${last}</b> 기준 | ${MONTHS.length}개월 데이터 | ${MEMBERS.length}명`;

  document.getElementById('month-chips').innerHTML = MONTHS.map(k=>`
    <span class="mchip ${k===last?'active':''}">${k}</span>`).join('');
}

// ── 전체 현황 ──────────────────────────────────
function renderStats() {
  const counts={Green:0,Amber:0,Red:0,Grey:0};
  MEMBERS.forEach(name=>{
    const agg = getCurrentAgg(name);
    const s = calcScore(agg, agg.remainWeeks||0);
    counts[getLight(s.total)]++;
  });
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card" onclick="setFilter('Green',null)"><div class="stat-label">🟢 그린</div><div class="stat-val sv-green">${counts.Green}</div></div>
    <div class="stat-card" onclick="setFilter('Amber',null)"><div class="stat-label">🟡 앰버</div><div class="stat-val sv-amber">${counts.Amber}</div></div>
    <div class="stat-card" onclick="setFilter('Red',null)"><div class="stat-label">🔴 레드</div><div class="stat-val sv-red">${counts.Red}</div></div>
    <div class="stat-card" onclick="setFilter('Grey',null)"><div class="stat-label">⬛ 그레이</div><div class="stat-val sv-grey">${counts.Grey}</div></div>`;
}

function renderTable() {
  const last = MONTHS[MONTHS.length-1];
  document.getElementById('panel-title').textContent = `전체 멤버 현황 — ${last} 기준`;

  const rows = MEMBERS.map(name => {
    const agg = getCurrentAgg(name);
    const s = calcScore(agg, agg.remainWeeks||0);
    const light = getLight(s.total);
    if(curFilter!=='all' && light!==curFilter) return null;

    const toGreen = Math.max(0, 70-s.total);
    const color = lcolor(light);
    return `<tr onclick="goPersonal('${name}')">
      <td><strong>${name}</strong></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${agg.totalWeeks+(agg.remainWeeks||0)}주</td>
      <td>
        <div class="sbar-wrap">
          <div class="sbar"><div class="sfill" style="width:${Math.min(100,s.total)}%;background:${color}"></div></div>
          <span class="snum" style="color:${color}">${s.total}</span>
        </div>
      </td>
      <td><span class="lbadge ${light}">${lkor(light)}</span></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${s.rates.rW.toFixed(2)}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${s.rates.vW.toFixed(2)}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${s.rates.oW.toFixed(2)}</td>
      <td>${toGreen===0?'<span style="color:var(--green);font-weight:600">✓ 달성</span>':`<span style="color:var(--red);font-size:12px">-${toGreen}점</span>`}</td>
    </tr>`;
  }).filter(Boolean);

  document.getElementById('tbody').innerHTML = rows.length
    ? rows.join('')
    : `<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--muted)">해당 조건의 멤버 없음</td></tr>`;
}

function setFilter(f, btn) {
  curFilter=f;
  if(btn) { document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  renderTable();
}

// ── 개인 상세 ──────────────────────────────────
function renderChips() {
  document.getElementById('chips').innerHTML = MEMBERS.map(name=>
    `<button class="chip" id="chip-${name}" onclick="selectMember('${name}')">${name}</button>`
  ).join('');
}

function goPersonal(name) { switchView('personal'); selectMember(name); }

function selectMember(name) {
  selMember = name;
  selPredictEnd = null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  const c = document.getElementById(`chip-${name}`);
  if(c) { c.classList.add('sel'); c.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  document.getElementById('pdetail').classList.add('show');
  buildPredictBtns();
  updatePersonal();
}

function buildPredictBtns() {
  // 현재 + 향후 3개월 예측 버튼
  const last = MONTHS[MONTHS.length-1];
  const lastMd = MONTHLY[last];
  const btns = [{label:'현재', key:null}];
  for(let i=1; i<=3; i++) {
    let m = lastMd.month + i, y = lastMd.year;
    if(m>12) { m-=12; y++; }
    const key = `${y}-${String(m).padStart(2,'0')}`;
    const mNames = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    btns.push({label:`${mNames[m]} 예측`, key});
  }

  const row = document.getElementById('predict-row');
  row.innerHTML = `<span class="predict-label">📅 예측 기간</span>` +
    btns.map(b=>`<button class="pbtn ${b.key===selPredictEnd?'active':''}" onclick="setPredictEnd('${b.key}')">${b.label}</button>`).join('');
}

function setPredictEnd(key) {
  selPredictEnd = key==='null'||key===null?null:key;
  buildPredictBtns();
  updatePersonal();
}

function updatePersonal() {
  if(!selMember) return;
  const name = selMember;
  const lastKey = MONTHS[MONTHS.length-1];
  const lastIdx = MONTHS.indexOf(lastKey);
  const lastMd = MONTHLY[lastKey];

  // 기준 시작: 6개월 전 (예측 종료월 기준)
  let endKey = lastKey;
  let futureMonths = []; // 아직 데이터 없는 미래 달

  if(selPredictEnd) {
    // 미래 달들 계산
    const [ey, em] = selPredictEnd.split('-').map(Number);
    const [ly, lm] = lastKey.split('-').map(Number);
    let cy=ly, cm=lm;
    while(true) {
      cm++; if(cm>12){cm=1;cy++;}
      const fk = `${cy}-${String(cm).padStart(2,'0')}`;
      futureMonths.push({key:fk, year:cy, month:cm});
      if(cy===ey && cm===em) break;
      if(futureMonths.length>6) break;
    }
    endKey = selPredictEnd;
  }

  // 6개월 범위 계산
  const [ey2, em2] = endKey.split('-').map(Number);
  let sy=ey2, sm=em2-5;
  if(sm<=0){sm+=12;sy--;}
  const startKey = `${sy}-${String(sm).padStart(2,'0')}`;

  // 현재까지 실제 집계
  const agg = aggregate(name, startKey, lastKey);

  // 미래 주수 계산
  const futureWeeks = futureMonths.reduce((s,f)=>s+countWed(f.year,f.month), 0);
  const remainInLast = agg.remainWeeks || 0;
  const totalFutureWeeks = remainInLast + futureWeeks; // 남은 전체 주수
  const totalWeeksAll = agg.totalWeeks + totalFutureWeeks; // 최종 총 주수

  // 빠지는 달 (롤링)
  const droppingMonths = [];
  if(selPredictEnd) {
    futureMonths.forEach((f,i) => {
      // i번째 미래달이 추가되면 startKey에서 i번째 달이 빠짐
      let dy=sy, dm=sm+i;
      if(dm>12){dm-=12;dy++;}
      const dk = `${dy}-${String(dm).padStart(2,'0')}`;
      if(MONTHS.includes(dk)) droppingMonths.push(dk);
    });
  }

  // 현재 점수 (지금까지 + 남은 주수)
  const curScore = calcScore(agg, remainInLast);
  // 예측 점수 (전체 기간)
  const predScore = calcScore(agg, totalFutureWeeks);
  const light = getLight(predScore.total);
  const color = lcolor(light);

  // ── 헤더 카드 ──
  const rangeLabel = `${startKey} ~ ${endKey} (${totalWeeksAll}주)`;
  document.getElementById('pcard').innerHTML = `
    <div class="pcard-top">
      <div>
        <div class="pname">${name}</div>
        <div style="margin-top:6px"><span class="lbadge ${light}">${lkor(light)}</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:5px">${rangeLabel}</div>
        ${droppingMonths.length>0?`<div style="font-size:11px;color:var(--amber);margin-top:3px">⚠️ 빠지는 달: ${droppingMonths.join(', ')}</div>`:''}
      </div>
      <div>
        <div class="pscore" style="color:${color}">${predScore.total}</div>
        <div class="pscore-sub">/ 100점</div>
        <div style="font-size:12px;margin-top:3px;text-align:right;color:${predScore.total>=70?'var(--green)':'var(--amber)'}">
          ${predScore.total>=70?'✅ 그린 달성!':'🎯 그린까지 '+(70-predScore.total)+'점'}
        </div>
      </div>
    </div>`;

  // ── 아무것도 안하면 ──
  const noActionScore = calcScore(agg, 0).total;
  const noActionLight = getLight(noActionScore);
  document.getElementById('no-action-card').innerHTML = `
    <div class="no-action-label">📊 아무것도 안 하면? (현재까지 기준)</div>
    <div class="no-action-body">
      <span class="no-action-score" style="color:${lcolor(noActionLight)}">${noActionScore}점</span>
      <span class="lbadge ${noActionLight}">${lkor(noActionLight)}</span>
      <span style="font-size:12px;color:var(--muted)">${noActionScore>=70?'✅ 현 페이스면 그린!':'남은 '+totalFutureWeeks+'주 동안 더 해야 해요'}</span>
    </div>`;

  // ── 피드백 ──
  renderFeedback(name, agg, predScore, totalFutureWeeks, totalWeeksAll, droppingMonths);

  // ── 활동 현황 테이블 ──
  renderActTable(agg, totalWeeksAll);

  // ── 항목별 점수 ──
  renderItems(agg, predScore, totalFutureWeeks, totalWeeksAll);
}

function renderFeedback(name, agg, predScore, futureWeeks, totalWeeks, droppingMonths) {
  const curLight = getLight(predScore.total);

  // 현재 평균 활동량
  const rPerWk = agg.totalWeeks>0 ? (agg.RGI+agg.RGO)/agg.totalWeeks : 0;
  const vPerWk = agg.totalWeeks>0 ? agg.V/agg.totalWeeks : 0;
  const oPerWk = agg.totalWeeks>0 ? agg.M121/agg.totalWeeks : 0;

  // 목표 달성 필요 항목 계산 함수
  function needFor(targetScore) {
    const gap = Math.max(0, targetScore - predScore.total);
    if(gap <= 0) return {gap:0, items:[], achieved:true};
    const items = [];

    // 리퍼럴
    if(predScore.bd.ref < 20) {
      const nextRate = predScore.bd.ref===0?0.5:predScore.bd.ref===5?0.75:predScore.bd.ref===10?1.0:1.2;
      const need = Math.max(0, Math.ceil(nextRate*totalWeeks)-(agg.RGI+agg.RGO));
      if(need>0) items.push({
        icon:'🤝',
        text: `리퍼럴 <span class="num">${need}건</span> 추가 → +5점
          <span class="week">(현재 주당 ${rPerWk.toFixed(2)}건 → 목표 ${nextRate}건,
          ${futureWeeks>0?'남은 '+futureWeeks+'주간 주당 '+(need/futureWeeks).toFixed(1)+'건':''})</span>`
      });
    }
    // 비지터
    if(predScore.bd.vis < 20) {
      const steps=[0.1,0.2,0.4,0.6];
      const nextV = steps.find(s=>Math.ceil(s*totalWeeks)>agg.V) || 0.6;
      const need = Math.max(0, Math.ceil(nextV*totalWeeks)-agg.V);
      if(need>0) items.push({
        icon:'👥',
        text:`비지터 <span class="num">${need}명</span> 초대 → +5점
          <span class="week">(현재 주당 ${vPerWk.toFixed(2)}명 → 목표 ${nextV}명)</span>`
      });
    }
    // 1:1
    if(predScore.bd.otwone < 10) {
      const nextO = predScore.bd.otwone===0?1:2;
      const need = Math.max(0, Math.ceil(nextO*totalWeeks)-agg.M121);
      if(need>0) items.push({
        icon:'☕',
        text:`1:1 <span class="num">${need}건</span> 더 → +5점
          <span class="week">(현재 주당 ${oPerWk.toFixed(2)}건 → 목표 ${nextO}건,
          ${futureWeeks>0?'남은 '+futureWeeks+'주간 주당 '+(need/futureWeeks).toFixed(1)+'건':''})</span>`
      });
    }
    // 교육
    if(predScore.bd.train < 10) {
      const need = predScore.bd.train===0?Math.max(0,10-agg.O):Math.max(0,20-agg.O);
      if(need>0) items.push({icon:'📚', text:`교육점수 <span class="num">${need}점</span> 추가 → +5점`});
    }
    // 결석
    if(predScore.bd.abs < 15) items.push({icon:'📅', text:`결석 없이 출석 유지 → +${15-predScore.bd.abs}점 회복 가능`});
    if(predScore.bd.time < 10) items.push({icon:'⏰', text:`지각 없이 정시 도착 → +${10-predScore.bd.time}점 회복 가능`});
    // 감사장
    if(predScore.bd.tyfcb < 15) {
      const next = predScore.bd.tyfcb===0?25000000:predScore.bd.tyfcb===5?50000000:100000000;
      const need = Math.max(0, next-agg.N);
      if(need>0) items.push({icon:'💰', text:`감사장 <span class="num">${need.toLocaleString('ko-KR')}원</span> 더 → +5점 (목표 ${next.toLocaleString('ko-KR')}원)`});
    }

    return {gap, items, achieved:false};
  }

  // 현실적 플랜 — 현재 활동량 기반으로 몇 달 걸리는지
  function realisticPlan() {
    if(curLight==='Green') return '';
    const targetLight = curLight==='Grey'?'Red':curLight==='Red'?'Amber':'Green';
    const targetScore = targetLight==='Green'?70:targetLight==='Amber'?50:30;
    const gap = Math.max(0, targetScore-predScore.total);
    if(gap<=0) return '';

    // 현재 페이스로 주당 얻을 수 있는 점수 증가량 추정
    const hint = curLight==='Grey'
      ? `현재 ${predScore.total}점 그레이예요. 바로 그린은 어렵지만 <b>먼저 레드(30점)</b>를 목표로 해요.`
      : curLight==='Red'
      ? `현재 ${predScore.total}점 레드예요. <b>앰버(50점)</b>를 먼저 목표로 해요.`
      : `현재 ${predScore.total}점 앰버예요. <b>그린(70점)</b>까지 ${gap}점 남았어요.`;

    return `<div class="fb-box fb-${curLight==='Grey'?'grey':curLight==='Red'?'red':'amber'}" style="margin-bottom:12px">
      <div class="fb-title fb-${curLight==='Grey'?'grey':curLight==='Red'?'red':'amber'}">💡 현실적인 플랜</div>
      <div class="fb-item"><span class="fb-icon">📌</span><span class="fb-text">${hint}</span></div>
      <div class="fb-item"><span class="fb-icon">📈</span><span class="fb-text">
        현재 주당 평균: 리퍼럴 <span class="num">${rPerWk.toFixed(2)}건</span> / 비지터 <span class="num">${vPerWk.toFixed(2)}명</span> / 1:1 <span class="num">${oPerWk.toFixed(2)}건</span>
      </span></div>
      ${droppingMonths.length>0?`<div class="fb-item"><span class="fb-icon">⚠️</span><span class="fb-text">빠지는 달(${droppingMonths.join(',')}) 데이터 영향을 고려했어요</span></div>`:''}
    </div>`;
  }

  // 목표별 피드백 박스
  const fbs = [];
  if(curLight==='Grey') {
    fbs.push({cls:'fb-red',   e:'🔴', t:'레드(30점) 목표', d:needFor(30)});
    fbs.push({cls:'fb-amber', e:'🟡', t:'앰버(50점) 목표', d:needFor(50)});
    fbs.push({cls:'fb-green', e:'🟢', t:'그린(70점) 목표', d:needFor(70)});
  } else if(curLight==='Red') {
    fbs.push({cls:'fb-amber', e:'🟡', t:'앰버(50점) 목표', d:needFor(50)});
    fbs.push({cls:'fb-green', e:'🟢', t:'그린(70점) 목표', d:needFor(70)});
  } else if(curLight==='Amber') {
    fbs.push({cls:'fb-green', e:'🟢', t:'그린(70점) 목표', d:needFor(70)});
  } else {
    fbs.push({cls:'fb-green', e:'🏆', t:'그린 유지!', d:{gap:0, items:[
      {icon:'✅', text:'현재 페이스 유지하면 그린 달성!'},
      {icon:'💪', text:`주당 리퍼럴 <span class="num">${rPerWk.toFixed(2)}건</span>, 1:1 <span class="num">${oPerWk.toFixed(2)}건</span> 유지하세요`},
    ], achieved:true}});
  }

  document.getElementById('feedback-wrap').innerHTML =
    realisticPlan() +
    fbs.map(fb=>`
      <div class="fb-box ${fb.cls}">
        <div class="fb-title ${fb.cls}">${fb.e} ${fb.t} ${fb.d.achieved?'✓ 달성':'— '+fb.d.gap+'점 필요'}</div>
        ${fb.d.items.slice(0,6).map(it=>`
          <div class="fb-item">
            <span class="fb-icon">${it.icon}</span>
            <span class="fb-text">${it.text}</span>
          </div>`).join('')}
        ${fb.d.items.length===0&&!fb.d.achieved?'<div style="font-size:13px;color:var(--muted)">항목 없음</div>':''}
      </div>`).join('');
}

function renderActTable(agg, totalWeeks) {
  const goalRef  = Math.ceil(1.2*totalWeeks);
  const goalVis  = Math.ceil(0.6*totalWeeks);
  const goalO121 = Math.ceil(2  *totalWeeks);
  const rows = [
    {name:'리퍼럴(T1+T2)', cur:agg.RGI+agg.RGO, need:Math.max(0,goalRef-(agg.RGI+agg.RGO)),  unit:'건', std:`목표 ${goalRef}건 (주당 1.2건)`},
    {name:'비지터',        cur:agg.V,             need:Math.max(0,goalVis-agg.V),               unit:'명', std:`목표 ${goalVis}명 (주당 0.6명)`},
    {name:'1:1 원투원',   cur:agg.M121,           need:Math.max(0,goalO121-agg.M121),           unit:'건', std:`목표 ${goalO121}건 (주당 2건)`},
    {name:'결석',         cur:agg.A,              need:null,                                     unit:'회', std:'0회 유지'},
    {name:'지각',         cur:agg.L,              need:null,                                     unit:'회', std:'0회 유지'},
    {name:'교육점수',     cur:agg.O,              need:Math.max(0,20-agg.O),                    unit:'점', std:'목표 20점'},
    {name:'감사장',       cur:won(agg.N),         need:agg.N>=100000000?0:null,                 unit:'',   std:'목표 1억 이상'},
  ];

  document.getElementById('act-table').innerHTML = `
    <thead><tr>
      <th>항목</th><th>현재 누적</th><th>더 필요한 것</th><th>그린 기준</th>
    </tr></thead>
    <tbody>${rows.map(r=>{
      const curDisp = typeof r.cur==='number'?`<span class="c-cur">${r.cur}${r.unit}</span>`:`<span class="c-cur">${r.cur}</span>`;
      const needDisp = r.need===null?`<span class="c-muted">—</span>`:r.need===0?`<span class="c-need-ok">✓ 달성</span>`:`<span class="c-need-bad">+${r.need}${r.unit}</span>`;
      return `<tr><td class="label">${r.name}</td><td>${curDisp}</td><td>${needDisp}</td><td class="c-muted" style="font-family:'Noto Sans KR',sans-serif;font-size:11px">${r.std}</td></tr>`;
    }).join('')}</tbody>`;
}

function renderItems(agg, score, futureWeeks, totalWeeks) {
  const items = [
    {name:'결석',       max:15, val:score.bd.abs,    hint: agg.A===0?'완벽 ✓':`결석 ${agg.A}회`},
    {name:'지각',       max:10, val:score.bd.time,   hint: agg.L===0?'완벽 ✓':`지각 ${agg.L}회`},
    {name:'주당 리퍼럴',max:20, val:score.bd.ref,    hint:`주당 ${score.rates.rW.toFixed(2)}건 (목표 1.2건)`},
    {name:'감사장',     max:15, val:score.bd.tyfcb,  hint:`${won(agg.N)} (1억 이상→15점)`},
    {name:'주당 비지터',max:20, val:score.bd.vis,    hint:`주당 ${score.rates.vW.toFixed(2)}명 (목표 0.6명)`},
    {name:'주당 1:1',   max:10, val:score.bd.otwone, hint:`주당 ${score.rates.oW.toFixed(2)}건 (목표 2건)`},
    {name:'교육점수',   max:10, val:score.bd.train,  hint:`${agg.O}점 (20점 이상→만점)`},
  ];
  document.getElementById('items-grid').innerHTML = items.map(it=>{
    const pct = Math.round(it.val/it.max*100);
    const fc = it.val>=it.max?'var(--green)':it.val>0?'var(--amber)':'var(--red)';
    return `<div class="icard">
      <div class="itop"><div class="iname">${it.name}</div><div class="imax">최대 ${it.max}점</div></div>
      <div class="ipts" style="color:${fc}">${it.val}<span style="font-size:11px;color:var(--muted)">점</span></div>
      <div class="ibar"><div class="ifill" style="width:${pct}%;background:${fc}"></div></div>
      <div class="ihint ${it.val>=it.max?'ok':it.val===0?'bad':''}">${it.hint}</div>
    </div>`;
  }).join('');
}

// ── 뷰 전환 ────────────────────────────────────
function switchView(v) {
  if(!MONTHS.length && v!=='panel') { showToast('먼저 파일을 업로드해 주세요', 'err'); return; }
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-view').style.display = v==='panel'?'block':'none';
  document.getElementById('personal-view').style.display = v==='personal'?'block':'none';
  document.querySelectorAll('.ntab')[v==='panel'?0:1].classList.add('active');
}

// ── 유틸 ───────────────────────────────────────
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'), 3500);
}
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(f&&(f.name.endsWith('.xlsx')||f.name.endsWith('.xls'))) readExcel(f);
});
