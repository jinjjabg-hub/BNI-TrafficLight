<script>
// ── 전역 변수 ──────────────────────────────────────────────────────
var MONTHLY = {};
var MONTHS = [];
var CHAPTER = '';
var DOW = 3;
var MEMBERS = [];
var curFilter = 'all';
var selName = null;
var selMode = 'current';

var DOW_MAP = {
  '일요일':0,'월요일':1,'화요일':2,'수요일':3,'목요일':4,'금요일':5,'토요일':6,
  '일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6
};

// ── 유틸 함수 ─────────────────────────────────────────────────────
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || 'ok');
  clearTimeout(t._tm);
  t._tm = setTimeout(function() { t.classList.remove('show'); }, 3500);
}

function num(v) {
  var x = parseFloat(String(v || 0).replace(/,/g, ''));
  return isNaN(x) ? 0 : Math.round(x);
}

function won(v) {
  if (!v || v === 0) return '0원';
  return v.toLocaleString('ko-KR') + '원';
}

function countDOW(y, m, dow) {
  var c = 0, d = new Date(y, m - 1, 1);
  while (d.getMonth() === m - 1) {
    if (d.getDay() === dow) c++;
    d.setDate(d.getDate() + 1);
  }
  return c;
}

function parseKey(k) {
  var m = k.match(/(\d{4})[^\d](\d{1,2})/);
  if (!m) return null;
  return { year: parseInt(m[1]), month: parseInt(m[2]) };
}

function toKey(y, m) {
  return y + '-' + (m < 10 ? '0' + m : m);
}

function keyLabel(k) {
  var p = parseKey(k);
  return p ? p.month + '월' : k;
}

function rollingStart(endKey) {
  var p = parseKey(endKey);
  if (!p) return MONTHS[0];
  var y = p.year, m = p.month - 5;
  if (m <= 0) { m += 12; y--; }
  return toKey(y, m);
}

function getLight(s) { return s >= 70 ? 'Green' : s >= 50 ? 'Amber' : s >= 30 ? 'Red' : 'Grey'; }
function lkor(l) { return { Green: '🟢 그린', Amber: '🟡 앰버', Red: '🔴 레드', Grey: '⬛ 그레이' }[l]; }
function lcolor(l) { return { Green: 'var(--g)', Amber: 'var(--a)', Red: 'var(--r)', Grey: 'var(--gr)' }[l]; }

// ── 이벤트 바인딩 ─────────────────────────────────────────────────
document.getElementById('selbtn').onclick = function() { document.getElementById('fin').click(); };
document.getElementById('rebtn').onclick = function() { document.getElementById('fin').click(); };
document.getElementById('fin').onchange = function() {
  var f = this.files[0];
  if (f) { waitXLSX(function() { readExcel(f); }); }
  this.value = '';
};

document.getElementById('upzone').onclick = function(e) {
  if (e.target === this || e.target.classList.contains('upzone-icon') ||
      e.target.classList.contains('upzone-title') || e.target.classList.contains('upzone-sub')) {
    document.getElementById('fin').click();
  }
};
document.getElementById('upzone').ondragover = function(e) { e.preventDefault(); this.classList.add('drag'); };
document.getElementById('upzone').ondragleave = function() { this.classList.remove('drag'); };
document.getElementById('upzone').ondrop = function(e) {
  e.preventDefault(); this.classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if (f) waitXLSX(function() { readExcel(f); });
};

document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
  e.preventDefault();
  var f = e.dataTransfer.files[0];
  if (f && (f.name.endsWith('.xlsx') || f.name.endsWith('.xls'))) {
    waitXLSX(function() { readExcel(f); });
  }
});

// 필터 버튼
document.getElementById('fall').onclick = function() { setFilter('all', this); };
document.getElementById('fgreen').onclick = function() { setFilter('Green', this); };
document.getElementById('famber').onclick = function() { setFilter('Amber', this); };
document.getElementById('fred').onclick = function() { setFilter('Red', this); };
document.getElementById('fgrey').onclick = function() { setFilter('Grey', this); };

// ── XLSX 로드 대기 ────────────────────────────────────────────────
function waitXLSX(cb) {
  if (typeof XLSX !== 'undefined') { cb(); return; }
  var tries = 0;
  var t = setInterval(function() {
    tries++;
    if (typeof XLSX !== 'undefined') { clearInterval(t); cb(); }
    else if (tries > 100) { clearInterval(t); toast('❌ 라이브러리 로드 실패. 인터넷 연결 확인해 주세요', 'err'); }
  }, 100);
}

// ── 파일 읽기 ─────────────────────────────────────────────────────
function readExcel(file) {
  toast('📂 읽는 중: ' + file.name);
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      processWorkbook(wb, file.name);
    } catch(err) {
      toast('❌ 파일 오류: ' + err.message, 'err');
    }
  };
  reader.onerror = function() { toast('❌ 파일 읽기 실패', 'err'); };
  reader.readAsArrayBuffer(file);
}

function processWorkbook(wb, fname) {
  MONTHLY = {}; MONTHS = []; CHAPTER = ''; DOW = 3;

  wb.SheetNames.forEach(function(sname) {
    var p = parseKey(sname);
    if (!p) return;

    var ws = wb.Sheets[sname];
    var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: 0 });
    if (rows.length < 3) return;

    // A1: 챕터명-요일
    if (!CHAPTER) {
      var a1 = String(rows[0][0] || '').trim();
      if (a1.indexOf('-') >= 0) {
        var parts = a1.split('-');
        CHAPTER = parts[0].trim();
        var ds = parts[1].trim();
        if (DOW_MAP[ds] !== undefined) DOW = DOW_MAP[ds];
        else if (DOW_MAP[ds.replace('요일', '')] !== undefined) DOW = DOW_MAP[ds.replace('요일', '')];
      }
    }

    // A2: 헤더
    var hd = rows[1].map(function(v) { return String(v || '').trim(); });
    function fi(arr) {
      for (var i = 0; i < hd.length; i++) {
        for (var j = 0; j < arr.length; j++) {
          if (hd[i].indexOf(arr[j]) >= 0) return i;
        }
      }
      return -1;
    }
    var idx = {
      name: fi(['멤버명','이름','First']),
      P: fi(['P 출석']), A: fi(['A 결석']), L: fi(['L 지각']),
      M: fi(['M 병가']), S: fi(['S 대리']),
      RGI: fi(['RGI']), RGO: fi(['RGO']),
      V: fi(['V 비지터']), M121: fi(['121 원투원','121']),
      N: fi(['감사장','Value of Business Given','Value of Business']), O: fi(['교육참가','Training'])
    };
    if (idx.name < 0) return;

    // A3부터 멤버 데이터
    var members = [];
    for (var r = 2; r < rows.length; r++) {
      var row = rows[r];
      var raw = row[idx.name];
      if (!raw || String(raw).trim() === '0') continue;
      var kor = String(raw).split(' ')[0].trim();
      if (kor.length < 2) continue;
      members.push({
        name: kor, full: String(raw).trim(),
        P: num(row[idx.P]), A: num(row[idx.A]), L: num(row[idx.L]),
        M: num(row[idx.M]), S: num(row[idx.S]),
        RGI: num(row[idx.RGI]), RGO: num(row[idx.RGO]),
        V: num(row[idx.V]), M121: num(row[idx.M121]),
        N: num(row[idx.N]), O: num(row[idx.O])
      });
    }
    if (!members.length) return;

    // 실제 진행 주수 = 최빈값 (공휴일 자동 반영)
    var totals = members.map(function(m) { return m.P + m.A + m.L + m.M + m.S; }).filter(function(v) { return v > 0; });
    var actualWeeks = countDOW(p.year, p.month, DOW);
    if (totals.length > 0) {
      var freq = {};
      totals.forEach(function(v) { freq[v] = (freq[v] || 0) + 1; });
      var best = Object.keys(freq).sort(function(a, b) { return freq[b] - freq[a]; })[0];
      actualWeeks = parseInt(best);
    }

    var fw = countDOW(p.year, p.month, DOW);
    var key = toKey(p.year, p.month);
    MONTHLY[key] = {
      year: p.year, month: p.month,
      members: members,
      actualWeeks: actualWeeks,
      fullWeeks: fw,
      remainWeeks: Math.max(0, fw - actualWeeks)
    };
  });

  MONTHS = Object.keys(MONTHLY).sort();
  if (!MONTHS.length) { toast('❌ 유효한 시트 없음 (시트명: 2025-10 형식)', 'err'); return; }

  var last = MONTHS[MONTHS.length - 1];
  MEMBERS = MONTHLY[last].members.map(function(m) { return m.name; });

  // 디버그: 각 달 주수 확인
  var dbg = MONTHS.map(function(k) { return keyLabel(k) + ':' + MONTHLY[k].actualWeeks; }).join(' | ');
  toast('✅ ' + (CHAPTER || fname) + ' | ' + MONTHS.length + '개월 로드\n' + dbg);

  document.getElementById('upzone').style.display = 'none';
  document.getElementById('dbar').style.display = 'flex';
  document.getElementById('pview').style.display = 'block';

  updateDbar();
  renderStats();
  renderTable();
  renderChips();
}

// ── 집계 ──────────────────────────────────────────────────────────
function aggregate(name, startKey, endKey) {
  var R = { P:0,A:0,L:0,M:0,S:0,RGI:0,RGO:0,V:0,M121:0,N:0,O:0,totalWeeks:0,remainWeeks:0,months:[] };
  var allKeys = MONTHS.filter(function(k) { return k >= startKey && k <= endKey; });
  var firstIdx = -1;
  for (var i = 0; i < allKeys.length; i++) {
    var found = false;
    var mbs = MONTHLY[allKeys[i]].members;
    for (var j = 0; j < mbs.length; j++) {
      if (mbs[j].name === name) { found = true; break; }
    }
    if (found) { firstIdx = i; break; }
  }
  if (firstIdx < 0) return R;
  var validKeys = allKeys.slice(firstIdx);

  for (var i = 0; i < validKeys.length; i++) {
    var k = validKeys[i];
    var md = MONTHLY[k];
    var mb = null;
    for (var j = 0; j < md.members.length; j++) {
      if (md.members[j].name === name) { mb = md.members[j]; break; }
    }
    if (!mb) continue;
    R.P += mb.P; R.A += mb.A; R.L += mb.L; R.M += mb.M; R.S += mb.S;
    R.RGI += mb.RGI; R.RGO += mb.RGO; R.V += mb.V; R.M121 += mb.M121;
    R.N += mb.N; R.O += mb.O;
    R.months.push(k);
    R.totalWeeks += md.actualWeeks;
  }

  if (validKeys.length > 0) {
    var lk = validKeys[validKeys.length - 1];
    var lmd = MONTHLY[lk];
    R.remainWeeks = Math.max(0, lmd.fullWeeks - lmd.actualWeeks);
  }
  return R;
}

// 확정된 마지막 달 (remainWeeks=0인 마지막 달)
function getConfirmedKey() {
  var last = MONTHS[MONTHS.length - 1];
  var lmd = MONTHLY[last];
  // 마지막 달이 진행중이면 (남은주수 있으면) 이전 달이 확정
  if (lmd.remainWeeks > 0 && MONTHS.length > 1) {
    return MONTHS[MONTHS.length - 2];
  }
  return last;
}

// 진행중인 달 (마지막 달이 아직 안끝났으면)
function getOngoingKey() {
  var last = MONTHS[MONTHS.length - 1];
  var lmd = MONTHLY[last];
  return lmd.remainWeeks > 0 ? last : null;
}

function getCurAgg(name) {
  var last = MONTHS[MONTHS.length - 1];
  return aggregate(name, rollingStart(last), last);
}

// 전체현황용: 확정된 달 기준
function getConfirmedAgg(name) {
  var ck = getConfirmedKey();
  return aggregate(name, rollingStart(ck), ck);
}

// ── 점수 계산 ─────────────────────────────────────────────────────
function calcScore(agg, extra) {
  extra = extra || 0;
  var tot = agg.totalWeeks + extra;
  if (tot === 0) return { total:0, bd:{abs:0,time:0,ref:0,vis:0,otwone:0,tyfcb:0,train:0}, rates:{rW:0,vW:0,oW:0} };
  var ref = agg.RGI + agg.RGO;
  var rW = ref / tot, vW = agg.V / tot, oW = agg.M121 / tot;
  var abs    = agg.A > 2 ? 0 : agg.A === 2 ? 5 : agg.A === 1 ? 10 : 15;
  var time   = agg.L >= 2 ? 0 : agg.L === 1 ? 5 : 10;
  var refPt  = rW < 0.5 ? 0 : rW < 0.75 ? 5 : rW < 1 ? 10 : rW < 1.2 ? 15 : 20;
  var visPt  = vW < 0.1 ? 0 : vW < 0.2 ? 5 : vW < 0.4 ? 10 : vW < 0.6 ? 15 : 20;
  var oPt    = oW < 1 ? 0 : oW < 2 ? 5 : 10;
  var tyfcb  = agg.N < 25000000 ? 0 : agg.N < 50000000 ? 5 : agg.N < 100000000 ? 10 : 15;
  var trPt   = agg.O < 10 ? 0 : agg.O < 20 ? 5 : 10;
  return {
    total: abs + time + refPt + visPt + oPt + tyfcb + trPt,
    bd: { abs:abs, time:time, ref:refPt, vis:visPt, otwone:oPt, tyfcb:tyfcb, train:trPt },
    rates: { rW:rW, vW:vW, oW:oW }
  };
}

// ── 데이터바 ──────────────────────────────────────────────────────
function updateDbar() {
  var last = MONTHS[MONTHS.length - 1];
  var lmd = MONTHLY[last];
  var dns = ['일','월','화','수','목','금','토'];
  document.getElementById('dinfo').innerHTML =
    '<b>' + (CHAPTER || '챕터') + '</b> ' + dns[DOW] + '요일 | ' + MONTHS.length + '개월 | ' + MEMBERS.length + '명 | 최신: ' + last;
  var html = '';
  for (var i = 0; i < MONTHS.length; i++) {
    var k = MONTHS[i];
    var md = MONTHLY[k];
    var isLast = k === last;
    var isOngoing = isLast && md.remainWeeks > 0;
    var cls = isOngoing ? 'mc og' : isLast ? 'mc cf' : 'mc';
    var lbl = isOngoing ? keyLabel(k) + '(' + md.actualWeeks + '/' + md.fullWeeks + '주)' : keyLabel(k);
    html += '<span class="' + cls + '">' + lbl + '</span>';
  }
  document.getElementById('mchips').innerHTML = html;
}

// ── 전체 현황 ─────────────────────────────────────────────────────
function renderStats() {
  var counts = { Green:0, Amber:0, Red:0, Grey:0 };
  var ck = getConfirmedKey();
  for (var i = 0; i < MEMBERS.length; i++) {
    var agg = getConfirmedAgg(MEMBERS[i]);
    var s = calcScore(agg, 0);
    counts[getLight(s.total)]++;
  }
  document.getElementById('ttitle').textContent = (CHAPTER || '') + ' 전체 현황 — ' + ck + ' 확정 기준';
  document.getElementById('srow').innerHTML =
    '<div class="sc" onclick="setFG()">' +
    '<div class="sc-lbl">🟢 그린</div><div class="sc-val vg">' + counts.Green + '</div></div>' +
    '<div class="sc" onclick="setFA()">' +
    '<div class="sc-lbl">🟡 앰버</div><div class="sc-val va">' + counts.Amber + '</div></div>' +
    '<div class="sc" onclick="setFR()">' +
    '<div class="sc-lbl">🔴 레드</div><div class="sc-val vr">' + counts.Red + '</div></div>' +
    '<div class="sc" onclick="setFGR()">' +
    '<div class="sc-lbl">⬛ 그레이</div><div class="sc-val vgr">' + counts.Grey + '</div></div>';
}
function setFG() { setFilter('Green', document.getElementById('fgreen')); }
function setFA() { setFilter('Amber', document.getElementById('famber')); }
function setFR() { setFilter('Red', document.getElementById('fred')); }
function setFGR() { setFilter('Grey', document.getElementById('fgrey')); }

function renderTable() {
  var html = '';
  var ck2 = getConfirmedKey();
  for (var i = 0; i < MEMBERS.length; i++) {
    var name = MEMBERS[i];
    var agg = getConfirmedAgg(name);
    var s = calcScore(agg, 0);
    var light = getLight(s.total);
    if (curFilter !== 'all' && light !== curFilter) continue;
    var color = lcolor(light);
    var toG = Math.max(0, 70 - s.total);
    var pct = Math.min(100, s.total);
    html += '<tr data-name="' + name + '" class="trow">' +
      '<td><strong>' + name + '</strong></td>' +
      '<td style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:var(--mut)">' + agg.totalWeeks + '주</td>' +
      '<td><div class="sbar-w"><div class="sbar"><div class="sfill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<span class="snum" style="color:' + color + '">' + s.total + '</span></div></td>' +
      '<td><span class="badge ' + light + '">' + lkor(light) + '</span></td>' +
      '<td style="font-family:\'IBM Plex Mono\',monospace;font-size:12px">' + s.rates.rW.toFixed(2) + '</td>' +
      '<td style="font-family:\'IBM Plex Mono\',monospace;font-size:12px">' + s.rates.vW.toFixed(2) + '</td>' +
      '<td style="font-family:\'IBM Plex Mono\',monospace;font-size:12px">' + s.rates.oW.toFixed(2) + '</td>' +
      '<td>' + (toG === 0 ? '<span style="color:var(--g);font-weight:600">✓</span>' : '<span style="color:var(--r);font-size:12px">-' + toG + '점</span>') + '</td>' +
      '</tr>';
  }
  document.getElementById('tbody').innerHTML = html || '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--mut)">해당 조건의 멤버 없음</td></tr>';
  // 클릭 이벤트
  var rows = document.getElementById('tbody').querySelectorAll('tr.trow');
  for (var k = 0; k < rows.length; k++) {
    rows[k].addEventListener('click', function() {
      goPersonal(this.getAttribute('data-name'));
    });
  }
}

function setFilter(f, btn) {
  curFilter = f;
  var btns = document.querySelectorAll('.fb');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('on');
  if (btn) btn.classList.add('on');
  renderTable();
}

// ── 개인 상세 ─────────────────────────────────────────────────────
function renderChips() {
  var html = '';
  for (var i = 0; i < MEMBERS.length; i++) {
    html += '<button class="chip" id="chip-' + MEMBERS[i] + '" data-name="' + MEMBERS[i] + '">' + MEMBERS[i] + '</button>';
  }
  document.getElementById('chips').innerHTML = html;
  // 클릭 이벤트
  var chipEls = document.getElementById('chips').querySelectorAll('button');
  for (var k = 0; k < chipEls.length; k++) {
    chipEls[k].addEventListener('click', function() {
      selectMember(this.getAttribute('data-name'));
    });
  }
}

function goPersonal(name) { switchView('personal'); selectMember(name); }

function selectMember(name) {
  selName = name; selMode = 'current';
  var chips = document.querySelectorAll('.chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('on');
  var c = document.getElementById('chip-' + name);
  if (c) { c.classList.add('on'); c.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  document.getElementById('pdet').classList.add('show');
  buildPbtns();
  updatePersonal();
}

function buildPbtns() {
  var ck = getConfirmedKey();
  var ok = getOngoingKey();
  var ckp = parseKey(ck);
  var mns = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  var btns = [];

  // 확정달
  btns.push({ mode: 'current', label: mns[ckp.month] + ' 확정' });

  // 진행중인 달
  if (ok) {
    var okp = parseKey(ok);
    btns.push({ mode: ok, label: mns[okp.month] + ' 예상' });
  }

  // 미래달 4개
  var basep = ok ? parseKey(ok) : ckp;
  var cy = basep.year, cm = basep.month;
  for (var i = 0; i < 4; i++) {
    cm++; if (cm > 12) { cm = 1; cy++; }
    var key = toKey(cy, cm);
    btns.push({ mode: key, label: mns[cm] + ' 예상' });
  }

  // 버튼 렌더링 - data-mode 속성 사용 (따옴표 충돌 없음)
  var html = '';
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    var isActive = selMode === b.mode;
    var cls = isActive ? (b.mode === 'current' ? 'pbtn cur' : 'pbtn pred') : 'pbtn';
    html += '<button class="' + cls + '" data-mode="' + b.mode + '">' + b.label + '</button>';
  }
  document.getElementById('pbtns').innerHTML = html;

  // 버튼 클릭 이벤트 - data-mode로 처리
  var pbtnEls = document.getElementById('pbtns').querySelectorAll('button');
  for (var j = 0; j < pbtnEls.length; j++) {
    pbtnEls[j].addEventListener('click', function() {
      setMode(this.getAttribute('data-mode'));
    });
  }
}

function setMode(mode) { selMode = mode; buildPbtns(); updatePersonal(); }

function updatePersonal() {
  if (!selName) return;
  var name = selName;
  var last = MONTHS[MONTHS.length - 1];
  var lmd = MONTHLY[last];

  var agg, extra = 0, rangeLabel = '', droppingKeys = [];

  if (selMode === 'current') {
    // 확정 모드: 마지막 완전히 끝난 달 기준
    var ck3 = getConfirmedKey();
    agg = aggregate(name, rollingStart(ck3), ck3);
    extra = 0; // 확정 점수라 extra 없음
    rangeLabel = rollingStart(ck3) + ' ~ ' + ck3 + ' 확정 (' + agg.totalWeeks + '주)';
  } else if (selMode === getOngoingKey()) {
    // 진행중인 달 모드 (4월 예상 - 실제 데이터 + 남은 주수)
    var ok2 = getOngoingKey();
    agg = aggregate(name, rollingStart(ok2), ok2);
    extra = agg.remainWeeks;
    droppingKeys = [];
    rangeLabel = rollingStart(ok2) + ' ~ ' + ok2 + ' 진행중 (' + agg.totalWeeks + '주 + 남은 ' + agg.remainWeeks + '주)';
  } else {
    var predEnd = selMode;
    var predStart = rollingStart(predEnd);
    var curStart = rollingStart(last);
    var realStart = predStart > (MONTHS[0] || '') ? predStart : (MONTHS[0] || predStart);

    agg = aggregate(name, realStart, last);

    // 미래 주수
    var pe = parseKey(predEnd);
    var cy = lmd.year, cm = lmd.month;
    var futW = 0;
    while (true) {
      cm++; if (cm > 12) { cm = 1; cy++; }
      if (cy > pe.year || (cy === pe.year && cm > pe.month)) break;
      futW += countDOW(cy, cm, DOW);
    }
    extra = agg.remainWeeks + futW;

    // 빠지는 달
    for (var i = 0; i < MONTHS.length; i++) {
      var k = MONTHS[i];
      if (k >= curStart && k < predStart) {
        var mbs = MONTHLY[k].members;
        for (var j = 0; j < mbs.length; j++) {
          if (mbs[j].name === name) { droppingKeys.push(k); break; }
        }
      }
    }

    rangeLabel = realStart + ' ~ ' + predEnd + ' 예측 (' + (agg.totalWeeks + extra) + '주)';
  }

  buildPbtns();

  var score = calcScore(agg, extra);
  var light = getLight(score.total);
  var color = lcolor(light);

  // 헤더 카드
  var dropHtml = droppingKeys.length > 0 ?
    '<div style="font-size:11px;color:var(--a);margin-top:3px">⚠️ 빠지는 달: ' + droppingKeys.map(keyLabel).join(', ') + '</div>' : '';
  var gapHtml = score.total >= 70 ?
    '<div style="font-size:12px;margin-top:3px;text-align:right;color:var(--g)">✅ 그린 달성!</div>' :
    '<div style="font-size:12px;margin-top:3px;text-align:right;color:var(--a)">🎯 그린까지 ' + (70 - score.total) + '점</div>';

  document.getElementById('pcard').innerHTML =
    '<div class="pcard-top">' +
    '<div><div class="pname">' + name + '</div>' +
    '<div style="margin-top:6px"><span class="badge ' + light + '">' + lkor(light) + '</span></div>' +
    '<div style="font-size:12px;color:var(--mut);margin-top:5px">' + rangeLabel + '</div>' +
    dropHtml + '</div>' +
    '<div><div class="pbig" style="color:' + color + '">' + score.total + '</div>' +
    '<div class="pbig-sub">/ 100점</div>' + gapHtml + '</div></div>';

  // 아무것도 안하면
  var naScore = calcScore(agg, 0).total;
  var naLight = getLight(naScore);
  document.getElementById('nacard').innerHTML =
    '<div><div class="na-lbl">📊 지금까지 실적만으로 마감하면</div></div>' +
    '<span class="na-score" style="color:' + lcolor(naLight) + '">' + naScore + '점</span>' +
    '<span class="badge ' + naLight + '">' + lkor(naLight) + '</span>' +
    '<span style="font-size:12px;color:var(--mut)">' +
    (extra > 0 ? '남은 ' + extra + '주 동안 더 해야 해요' : '현재 확정 점수') + '</span>';

  renderFeedback(agg, score, extra, droppingKeys);
  renderItems(agg, score);
  renderActTable(agg, score, extra);
}

// ── 피드백 ────────────────────────────────────────────────────────
function renderFeedback(agg, score, extra, droppingKeys) {
  var light = getLight(score.total);
  var totalW = agg.totalWeeks + extra;
  var rPW = agg.totalWeeks > 0 ? (agg.RGI + agg.RGO) / agg.totalWeeks : 0;
  var vPW = agg.totalWeeks > 0 ? agg.V / agg.totalWeeks : 0;
  var oPW = agg.totalWeeks > 0 ? agg.M121 / agg.totalWeeks : 0;

  function getChoices(target) {
    var gap = Math.max(0, target - score.total);
    if (gap <= 0) return { gap:0, choices:[], min:0, done:true };
    var ch = [];

    if (score.bd.abs < 15) ch.push({ ico:'📅', lbl:'결석 없이 출석', txt:'앞으로 결석 없으면', sub:'+' + (15 - score.bd.abs) + '점 회복', pts:15 - score.bd.abs });
    if (score.bd.time < 10) ch.push({ ico:'⏰', lbl:'정시 도착', txt:'앞으로 지각 없으면', sub:'+' + (10 - score.bd.time) + '점 회복', pts:10 - score.bd.time });

    if (score.bd.ref < 20) {
      var nr = score.bd.ref === 0 ? 0.5 : score.bd.ref === 5 ? 0.75 : score.bd.ref === 10 ? 1.0 : 1.2;
      var needR = Math.max(0, Math.ceil(nr * totalW) - (agg.RGI + agg.RGO));
      if (needR > 0) {
        var pw = extra > 0 ? (needR / extra).toFixed(1) : '-';
        ch.push({ ico:'🤝', lbl:'리퍼럴', txt:needR + '건 추가 → +5점', sub:extra > 0 ? '남은 ' + extra + '주 주당 ' + pw + '건' : '현재 주당 ' + rPW.toFixed(2) + '건', pts:5 });
      }
    }

    if (score.bd.vis < 20) {
      var steps = [0.1, 0.2, 0.4, 0.6];
      var nv = 0.6;
      for (var i = 0; i < steps.length; i++) {
        if (Math.ceil(steps[i] * totalW) > agg.V) { nv = steps[i]; break; }
      }
      var needV = Math.max(0, Math.ceil(nv * totalW) - agg.V);
      if (needV > 0) ch.push({ ico:'👥', lbl:'비지터', txt:needV + '명 초대 → +5점', sub:'현재 주당 ' + vPW.toFixed(2) + '명', pts:5 });
    }

    if (score.bd.otwone < 10) {
      var no = score.bd.otwone === 0 ? 1 : 2;
      var needO = Math.max(0, Math.ceil(no * totalW) - agg.M121);
      if (needO > 0) {
        var pw2 = extra > 0 ? (needO / extra).toFixed(1) : '-';
        ch.push({ ico:'☕', lbl:'1:1', txt:needO + '건 더 → +5점', sub:extra > 0 ? '남은 ' + extra + '주 주당 ' + pw2 + '건' : '현재 주당 ' + oPW.toFixed(2) + '건', pts:5 });
      }
    }

    if (score.bd.tyfcb < 15) {
      var nt = score.bd.tyfcb === 0 ? 25000000 : score.bd.tyfcb === 5 ? 50000000 : 100000000;
      var needN = Math.max(0, nt - agg.N);
      if (needN > 0) ch.push({ ico:'💰', lbl:'감사장', txt:needN.toLocaleString('ko-KR') + '원 더 → +5점', sub:'목표 ' + nt.toLocaleString('ko-KR') + '원', pts:5 });
    }

    if (score.bd.train < 10) {
      var needE = score.bd.train === 0 ? Math.max(0, 10 - agg.O) : Math.max(0, 20 - agg.O);
      if (needE > 0) ch.push({ ico:'📚', lbl:'교육점수', txt:needE + '점 추가 → +5점', sub:'포럼·팟캐스트', pts:5 });
    }

    var sorted = ch.slice().sort(function(a, b) { return b.pts - a.pts; });
    var cum = 0, mn = 0;
    for (var i = 0; i < sorted.length; i++) { cum += sorted[i].pts; mn++; if (cum >= gap) break; }
    return { gap:gap, choices:ch, min:mn, done:false };
  }

  var fbCls = light === 'Grey' ? 'grey' : light === 'Red' ? 'red' : light === 'Amber' ? 'amber' : 'green';
  var ftCls = light === 'Grey' ? 'ftg' : light === 'Red' ? 'ftr' : light === 'Amber' ? 'fta' : 'ftg2';
  var dropLine = droppingKeys.length > 0 ?
    '<div class="fb-row"><span class="fb-ico">⚠️</span><span class="fb-txt">빠지는 달(' + droppingKeys.map(keyLabel).join(', ') + ') 영향 반영</span></div>' : '';

  var html =
    '<div class="fb-box fb-' + fbCls + '" style="margin-bottom:12px">' +
    '<div class="fb-title ' + ftCls + '">💡 현재 활동 페이스</div>' +
    '<div class="fb-row"><span class="fb-ico">📈</span><span class="fb-txt">주당 평균 — 리퍼럴 ' + rPW.toFixed(2) + '건 / 비지터 ' + vPW.toFixed(2) + '명 / 1:1 ' + oPW.toFixed(2) + '건</span></div>' +
    (extra > 0 ? '<div class="fb-row"><span class="fb-ico">⏰</span><span class="fb-txt">남은 <b>' + extra + '주</b> 기준 피드백이에요</span></div>' : '') +
    dropLine + '</div>';

  function makeFb(cls, ftc, emoji, title, target) {
    var r = getChoices(target);
    if (r.done) return '<div class="fb-box fb-' + cls + '">' +
      '<div class="fb-title ' + ftc + '">' + emoji + ' ' + title + ' ✅ 달성!</div>' +
      '<div class="fb-row"><span class="fb-ico">🏆</span><span class="fb-txt">현재 페이스 유지하면 달성 가능해요!</span></div></div>';
    var rows = '';
    for (var i = 0; i < r.choices.length; i++) {
      var c = r.choices[i];
      rows += '<div class="fb-row"><span class="fb-ico">' + c.ico + '</span>' +
        '<span class="fb-txt">' + c.lbl + ' ' + c.txt + (c.sub ? ' <span style="color:var(--mut);font-size:11px">(' + c.sub + ')</span>' : '') + '</span>' +
        '<span class="fb-pts">+' + c.pts + '점</span></div>';
    }
    return '<div class="fb-box fb-' + cls + '">' +
      '<div class="fb-title ' + ftc + '">' + emoji + ' ' + title + ' — ' + r.gap + '점 필요</div>' +
      '<div class="fb-cnt">아래 중 <b>' + r.min + '개 이상</b> 달성하면 ' + title.replace(/\(.*\)/, '').trim() + ' 달성!</div>' +
      rows + '</div>';
  }

  if (light === 'Grey') {
    html += makeFb('red', 'ftr', '🔴', '레드(30점)', 30);
    html += makeFb('amber', 'fta', '🟡', '앰버(50점)', 50);
    html += makeFb('green', 'ftg2', '🟢', '그린(70점)', 70);
  } else if (light === 'Red') {
    html += makeFb('amber', 'fta', '🟡', '앰버(50점)', 50);
    html += makeFb('green', 'ftg2', '🟢', '그린(70점)', 70);
  } else if (light === 'Amber') {
    html += makeFb('green', 'ftg2', '🟢', '그린(70점)', 70);
  } else {
    html += makeFb('green', 'ftg2', '🏆', '그린 유지!', 71);
  }
  document.getElementById('fbwrap').innerHTML = html;
}

// ── 항목별 점수 ───────────────────────────────────────────────────
function renderItems(agg, score) {
  var items = [
    { name:'출석(결석)', max:15, val:score.bd.abs, hint:agg.A === 0 ? '결석 없음 ✓' : '결석 ' + agg.A + '회' },
    { name:'지각', max:10, val:score.bd.time, hint:agg.L === 0 ? '지각 없음 ✓' : '지각 ' + agg.L + '회' },
    { name:'주당 리퍼럴', max:20, val:score.bd.ref, hint:'주당 ' + score.rates.rW.toFixed(2) + '건 (목표 1.2건)' },
    { name:'주당 비지터', max:20, val:score.bd.vis, hint:'주당 ' + score.rates.vW.toFixed(2) + '명 (목표 0.6명)' },
    { name:'주당 1:1', max:10, val:score.bd.otwone, hint:'주당 ' + score.rates.oW.toFixed(2) + '건 (목표 2건)' },
    { name:'감사장', max:15, val:score.bd.tyfcb, hint:won(agg.N) + ' (1억 이상→15점)' },
    { name:'교육점수', max:10, val:score.bd.train, hint:agg.O + '점 (20점 이상→만점)' }
  ];
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var pct = Math.round(it.val / it.max * 100);
    var fc = it.val >= it.max ? 'var(--g)' : it.val > 0 ? 'var(--a)' : 'var(--r)';
    var hcls = it.val >= it.max ? 'ok' : it.val === 0 ? 'bad' : '';
    html += '<div class="icard">' +
      '<div class="itop"><div class="iname">' + it.name + '</div><div class="imax">최대 ' + it.max + '점</div></div>' +
      '<div class="ipts" style="color:' + fc + '">' + it.val + '<span style="font-size:11px;color:var(--mut)">점</span></div>' +
      '<div class="ibar"><div class="ifill" style="width:' + pct + '%;background:' + fc + '"></div></div>' +
      '<div class="ihint ' + hcls + '">' + it.hint + '</div></div>';
  }
  document.getElementById('igrid').innerHTML = html;
}

// ── 활동 현황 테이블 ──────────────────────────────────────────────
function renderActTable(agg, score, extra) {
  var tw = agg.totalWeeks + extra;
  var rows = [
    { name:'출석/결석', cur:'출석 ' + agg.P + '회 / 결석 ' + agg.A + '회', need:null, std:'결석 0회→15점' },
    { name:'지각', cur:agg.L + '회', need:null, std:'지각 0회→10점' },
    { name:'리퍼럴(T1+T2)', cur:(agg.RGI + agg.RGO) + '건', need:Math.max(0, Math.ceil(1.2 * tw) - (agg.RGI + agg.RGO)), unit:'건', std:'목표 ' + Math.ceil(1.2 * tw) + '건 (주당 1.2건)' },
    { name:'비지터', cur:agg.V + '명', need:Math.max(0, Math.ceil(0.6 * tw) - agg.V), unit:'명', std:'목표 ' + Math.ceil(0.6 * tw) + '명 (주당 0.6명)' },
    { name:'1:1 원투원', cur:agg.M121 + '건', need:Math.max(0, Math.ceil(2 * tw) - agg.M121), unit:'건', std:'목표 ' + Math.ceil(2 * tw) + '건 (주당 2건)' },
    { name:'감사장', cur:won(agg.N), need:agg.N >= 100000000 ? 0 : null, std:'목표 1억 이상' },
    { name:'교육점수', cur:agg.O + '점', need:Math.max(0, 20 - agg.O), unit:'점', std:'목표 20점' }
  ];
  var html = '<thead><tr><th>항목</th><th>현재 누적</th><th>더 필요한 것</th><th>그린 기준</th></tr></thead><tbody>';
  for (var i = 0; i < rows.length; i++) {
    var row = rows[i];
    var nd = row.need === null ? '<span class="cmut">—</span>' :
      row.need === 0 ? '<span class="cok">✓ 달성</span>' :
      '<span class="cbad">+' + row.need + (row.unit || '') + '</span>';
    html += '<tr><td class="albl">' + row.name + '</td>' +
      '<td class="ccur">' + row.cur + '</td>' +
      '<td>' + nd + '</td>' +
      '<td class="cmut" style="font-family:\'Noto Sans KR\',sans-serif;font-size:11px">' + row.std + '</td></tr>';
  }
  html += '</tbody>';
  document.getElementById('atable').innerHTML = html;
}

// ── 뷰 전환 ──────────────────────────────────────────────────────
function switchView(v) {
  if (!MONTHS.length && v !== 'panel') { toast('먼저 파일을 업로드해 주세요', 'err'); return; }
  document.getElementById('tab-panel').className = v === 'panel' ? 'ntab on' : 'ntab';
  document.getElementById('tab-personal').className = v === 'personal' ? 'ntab on' : 'ntab';
  document.getElementById('pview').style.display = v === 'panel' ? 'block' : 'none';
  document.getElementById('perv').style.display = v === 'personal' ? 'block' : 'none';
}
