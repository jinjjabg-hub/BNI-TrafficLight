<script>
var MONTHLY={},MONTHS=[],CHAPTER="",DOW=3,MEMBERS=[],curFilter="all",selMember=null,selMode="current";
var DOW_MAP={"일요일":0,"월요일":1,"화요일":2,"수요일":3,"목요일":4,"금요일":5,"토요일":6,"일":0,"월":1,"화":2,"수":3,"목":4,"금":5,"토":6};

function countDOW(year,month,dow){
  var c=0,d=new Date(year,month-1,1);
  while(d.getMonth()===month-1){if(d.getDay()===dow)c++;d.setDate(d.getDate()+1);}
  return c;
}
function parseKey(k){var m=k.match(/(\d{4})[^\d](\d{1,2})/);return m?{year:parseInt(m[1]),month:parseInt(m[2])}:null;}
function keyLabel(k){var p=parseKey(k);return p?p.month+"월":k;}
function rollingStart(endKey){
  var p=parseKey(endKey);if(!p)return MONTHS[0];
  var y=p.year,m=p.month-5;
  if(m<=0){m+=12;y--;}
  return y+"-"+(m<10?"0"+m:m);
}
function n(v){var x=parseFloat(String(v||0).replace(/,/g,""));return isNaN(x)?0:Math.round(x);}
function won(v){if(!v||v===0)return "0원";return v.toLocaleString("ko-KR")+"원";}
function getLight(s){return s>=70?"Green":s>=50?"Amber":s>=30?"Red":"Grey";}
function lkor(l){return{Green:"🟢 그린",Amber:"🟡 앰버",Red:"🔴 레드",Grey:"⬛ 그레이"}[l];}
function lcolor(l){return{Green:"var(--green)",Amber:"var(--amber)",Red:"var(--red)",Grey:"var(--grey)"}[l];}

function handleDrop(e){e.preventDefault();document.getElementById("upload-zone").classList.remove("drag-over");var f=e.dataTransfer.files[0];if(f)readExcel(f);}
function waitXLSX(cb){
  if(typeof XLSX!=="undefined"){cb();return;}
  var tries=0;
  var t=setInterval(function(){
    tries++;
    if(typeof XLSX!=="undefined"){clearInterval(t);cb();}
    else if(tries>100){clearInterval(t);showToast("❌ 라이브러리 로드 실패. 인터넷 연결 확인해 주세요","err");}
  },100);
}
function handleFile(inp){var f=inp.files[0];if(f)waitXLSX(function(){readExcel(f);});inp.value="";}
function readExcel(file){
  showToast("📂 파일 읽는 중: "+file.name,"ok");
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      if(typeof XLSX==="undefined"){showToast("❌ XLSX 라이브러리 없음","err");return;}
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      showToast("✅ 시트 "+wb.SheetNames.length+"개 감지","ok");
      processWorkbook(wb,file.name);
    }catch(err){showToast("❌ 파일 오류: "+err.message,"err");}
  };
  reader.onerror=function(){showToast("❌ 파일 읽기 실패","err");};
  reader.readAsArrayBuffer(file);
}

function processWorkbook(wb,filename){
  MONTHLY={};MONTHS=[];CHAPTER="";DOW=3;
  wb.SheetNames.forEach(function(sheetName){
    var p=parseKey(sheetName);if(!p)return;
    var ws=wb.Sheets[sheetName];
    var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:0});
    if(rows.length<3)return;
    // A1: 챕터명-요일
    if(!CHAPTER){
      var a1=String(rows[0][0]||"").trim();
      if(a1.includes("-")){
        var parts=a1.split("-");
        CHAPTER=parts[0].trim();
        var dowStr=parts[1].trim();
        DOW=DOW_MAP[dowStr]!==undefined?DOW_MAP[dowStr]:DOW_MAP[dowStr.replace("요일","")]||3;
      }
    }
    // A2: 헤더
    var hd=rows[1].map(function(v){return String(v||"").trim();});
    var idx={
      name:hd.findIndex(function(h){return h.includes("멤버명")||h.includes("이름")||h.includes("First");}),
      P:hd.findIndex(function(h){return h.includes("P 출석")||h==="P";}),
      A:hd.findIndex(function(h){return h.includes("A 결석")||h==="A";}),
      L:hd.findIndex(function(h){return h.includes("L 지각")||h==="L";}),
      M:hd.findIndex(function(h){return h.includes("M 병가")||h==="M";}),
      S:hd.findIndex(function(h){return h.includes("S 대리")||h==="S";}),
      RGI:hd.findIndex(function(h){return h.includes("RGI");}),
      RGO:hd.findIndex(function(h){return h.includes("RGO");}),
      V:hd.findIndex(function(h){return h.includes("V 비지터")||h==="V";}),
      M121:hd.findIndex(function(h){return h.includes("121 원투원")||h.includes("121");}),
      N:hd.findIndex(function(h){return h.includes("감사장")||h.includes("Value of Business");}),
      O:hd.findIndex(function(h){return h.includes("교육참가")||h.includes("Training");}),
    };
    if(idx.name<0)return;
    // A3부터 멤버
    var members=[];
    for(var r=2;r<rows.length;r++){
      var row=rows[r];
      var raw=row[idx.name];
      if(!raw||String(raw).trim()==="0")continue;
      var kor=String(raw).split(" ")[0].trim();
      if(kor.length<2)continue;
      members.push({
        name:kor,fullName:String(raw).trim(),
        P:n(row[idx.P]),A:n(row[idx.A]),L:n(row[idx.L]),
        M:n(row[idx.M]),S:n(row[idx.S]),
        RGI:n(row[idx.RGI]),RGO:n(row[idx.RGO]),
        V:n(row[idx.V]),M121:n(row[idx.M121]),
        N:n(row[idx.N]),O:n(row[idx.O])
      });
    }
    if(!members.length)return;
    // 실제 진행 주수 = 최빈값
    var totals=members.map(function(m){return m.P+m.A+m.L+m.M+m.S;}).filter(function(v){return v>0;});
    var actualWeeks=countDOW(p.year,p.month,DOW);
    if(totals.length>0){
      var freq={};
      totals.forEach(function(v){freq[v]=(freq[v]||0)+1;});
      actualWeeks=parseInt(Object.entries(freq).sort(function(a,b){return b[1]-a[1];})[0][0]);
    }
    var key=p.year+"-"+(p.month<10?"0"+p.month:p.month);
    MONTHLY[key]={year:p.year,month:p.month,members:members,actualWeeks:actualWeeks,
      fullWeeks:countDOW(p.year,p.month,DOW)};
  });
  MONTHS=Object.keys(MONTHLY).sort();
  if(!MONTHS.length){showToast("❌ 유효한 시트 없음 (시트명: 2025-10 형식 필요)","err");return;}
  MEMBERS=MONTHLY[MONTHS[MONTHS.length-1]].members.map(function(m){return m.name;});
  document.getElementById("upload-zone").style.display="none";
  document.getElementById("data-bar").style.display="flex";
  document.getElementById("panel-view").style.display="block";
  updateDataBar();renderStats();renderTable();renderChips();
  showToast("✅ "+(CHAPTER||filename)+" | "+MONTHS.length+"개월 | "+MEMBERS.length+"명 로드 완료","ok");
}

// 집계: startKey~endKey, 멤버 첫 등장달부터, 탈퇴 달 skip
// 마지막 달은 actualWeeks만, 나머지는 actualWeeks 전체
function aggregate(memberName,startKey,endKey){
  var R={P:0,A:0,L:0,M:0,S:0,RGI:0,RGO:0,V:0,M121:0,N:0,O:0,totalWeeks:0,remainWeeks:0,months:[]};
  var allKeys=MONTHS.filter(function(k){return k>=startKey&&k<=endKey;});
  var firstIdx=allKeys.findIndex(function(k){return MONTHLY[k].members.find(function(x){return x.name===memberName;});});
  if(firstIdx<0)return R;
  var validKeys=allKeys.slice(firstIdx);
  validKeys.forEach(function(k,i){
    var md=MONTHLY[k];
    var m=md.members.find(function(x){return x.name===memberName;});
    if(!m)return;
    R.P+=m.P;R.A+=m.A;R.L+=m.L;R.M+=m.M;R.S+=m.S;
    R.RGI+=m.RGI;R.RGO+=m.RGO;R.V+=m.V;R.M121+=m.M121;R.N+=m.N;R.O+=m.O;
    R.months.push(k);
    R.totalWeeks+=md.actualWeeks;
  });
  if(validKeys.length>0){
    var lastKey=validKeys[validKeys.length-1];
    var lastMd=MONTHLY[lastKey];
    R.remainWeeks=Math.max(0,lastMd.fullWeeks-lastMd.actualWeeks);
  }
  return R;
}

function calcScore(agg,extraWeeks){
  extraWeeks=extraWeeks||0;
  var tot=agg.totalWeeks+extraWeeks;
  if(tot===0)return{total:0,bd:{abs:0,time:0,ref:0,vis:0,otwone:0,tyfcb:0,train:0},rates:{rW:0,vW:0,oW:0}};
  var ref=agg.RGI+agg.RGO;
  var rW=ref/tot,vW=agg.V/tot,oW=agg.M121/tot;
  var abs=agg.A>2?0:agg.A===2?5:agg.A===1?10:15;
  var time=agg.L>=2?0:agg.L===1?5:10;
  var refPt=rW<0.5?0:rW<0.75?5:rW<1?10:rW<1.2?15:20;
  var visPt=vW<0.1?0:vW<0.2?5:vW<0.4?10:vW<0.6?15:20;
  var oPt=oW<1?0:oW<2?5:10;
  var tyfcb=agg.N<25000000?0:agg.N<50000000?5:agg.N<100000000?10:15;
  var trPt=agg.O<10?0:agg.O<20?5:10;
  return{total:abs+time+refPt+visPt+oPt+tyfcb+trPt,
    bd:{abs:abs,time:time,ref:refPt,vis:visPt,otwone:oPt,tyfcb:tyfcb,train:trPt},
    rates:{rW:rW,vW:vW,oW:oW}};
}

function getCurrentAgg(name){
  var lastKey=MONTHS[MONTHS.length-1];
  return aggregate(name,rollingStart(lastKey),lastKey);
}

function updateDataBar(){
  var last=MONTHS[MONTHS.length-1];

  document.getElementById("mchips").innerHTML=MONTHS.map(function(k){
    var md=MONTHLY[k];

    var isOngoing=isLast&&md.remainWeeks>0;

    var label=isOngoing?keyLabel(k)+"("+md.actualWeeks+"/"+md.fullWeeks+"주)":keyLabel(k);
    return "<span class='"+cls+"'>"+label+"<\/span>";
  }).join("");
}

function buildPredictBtns(name){
  var lastKey=MONTHS[MONTHS.length-1];

  var btns=[{label:"현재 (확정)",mode:"current",cls:"cur"}];
  var cy=lastMd.year,cm=lastMd.month;
  for(var i=0;i<4;i++){
    cm++;if(cm>12){cm=1;cy++;}
    var key=cy+"-"+(cm<10?"0"+cm:cm);
    btns.push({label:mNames[cm]+" 예상",mode:key,cls:"pred"});
  }
  document.getElementById("predict-btns").innerHTML=btns.map(function(b){
    var isActive=b.mode===selMode;
    var cls=isActive?(b.cls==="cur"?"pbtn active-cur":"pbtn active-pred"):"pbtn";
    return "<button class='"+cls+"' onclick='setMode(""+b.mode+"")'>" +b.label+"<\/button>";
  }).join("");
}

function updatePersonal(){
  if(!selMember)return;
  var name=selMember;
  var lastKey=MONTHS[MONTHS.length-1];
  var lastMd=MONTHLY[lastKey];
  var agg,extraWeeks=0,rangeLabel="",droppingKeys=[];

  if(selMode==="current"){
    // 현재: 롤링6개월 + 남은주수
    agg=getCurrentAgg(name);
    extraWeeks=agg.remainWeeks;
    var startKey=rollingStart(lastKey);
    rangeLabel=startKey+" ~ "+lastKey+" ("+agg.totalWeeks+"주 + 남은 "+agg.remainWeeks+"주)";
  } else {
    // 예측: 예측종료월 기준 롤링6개월
    var predEndKey=selMode;
    var predStart=rollingStart(predEndKey);
    var curStart=rollingStart(lastKey);

    // 현재까지 실제 집계 (예측 롤링 시작 ~ 마지막 실제 달)
    var realStart=predStart>MONTHS[0]?predStart:MONTHS[0];
    agg=aggregate(name,realStart,lastKey);

    // 미래 달 주수
    var p=parseKey(lastKey);
    var pe=parseKey(predEndKey);
    var cy=p.year,cm=p.month;
    var futureWeeks=0;
    while(true){
      cm++;if(cm>12){cm=1;cy++;}
      if(cy>pe.year||(cy===pe.year&&cm>pe.month))break;
      futureWeeks+=countDOW(cy,cm,DOW);
    }
    extraWeeks=agg.remainWeeks+futureWeeks;

    // 빠지는 달
    droppingKeys=MONTHS.filter(function(k){
      return k>=curStart&&k<predStart&&MONTHLY[k].members.find(function(x){return x.name===name;});
    });

    var predStartLabel=realStart;
    rangeLabel=predStartLabel+" ~ "+predEndKey+" 예측 ("+(agg.totalWeeks+extraWeeks)+"주 기준)";
  }

  buildPredictBtns(name);
  var score=calcScore(agg,extraWeeks);
  var light=getLight(score.total);
  var color=lcolor(light);

  // 헤더 카드
  document.getElementById("pcard").innerHTML=
    "<div class='pcard-top'>" +
    "<div>" +
    "<div class='pname'>"+name+"<\/div>" +
    "<div style='margin-top:6px'><span class='lbadge "+light+"'>"+lkor(light)+"<\/span><\/div>" +
    "<div style='font-size:12px;color:var(--muted);margin-top:5px'>"+rangeLabel+"<\/div>" +
    (droppingKeys.length>0?"<div style='font-size:11px;color:var(--amber);margin-top:3px'>⚠️ 빠지는 달: "+droppingKeys.map(keyLabel).join(", ")+"<\/div>":"") +
    "<\/div>" +
    "<div>" +
    "<div class='pscore-big' style='color:"+color+"'>"+score.total+"<\/div>" +
    "<div class='pscore-sub'>/ 100점<\/div>" +
    "<div style='font-size:12px;margin-top:3px;text-align:right;color:"+(score.total>=70?"var(--green)":"var(--amber)")+"'>" +
    (score.total>=70?"✅ 그린 달성!":"🎯 그린까지 "+(70-score.total)+"점") +
    "<\/div><\/div><\/div>";

  // 아무것도 안하면
  var naScore=calcScore(agg,0).total;
  var naLight=getLight(naScore);
  document.getElementById("no-action-card").innerHTML=
    "<div><div class='na-label'>📊 지금까지 실적만으로 마감하면<\/div><\/div>" +
    "<span class='na-score' style='color:"+lcolor(naLight)+"'>"+naScore+"점<\/span>" +
    "<span class='lbadge "+naLight+"'>"+lkor(naLight)+"<\/span>" +
    "<span style='font-size:12px;color:var(--muted)'>"+(extraWeeks>0?"남은 "+extraWeeks+"주 동안 더 해야 해요":"현재 확정 점수")+"<\/span>";

  renderFeedback(agg,score,extraWeeks,droppingKeys);
  renderItems(agg,score);
  renderActTable(agg,score,extraWeeks);
}

function renderFeedback(agg,score,extraWeeks,droppingKeys){
  var light=getLight(score.total);
  var totalWeeks=agg.totalWeeks+extraWeeks;
  var rPerWk=agg.totalWeeks>0?(agg.RGI+agg.RGO)/agg.totalWeeks:0;
  var vPerWk=agg.totalWeeks>0?agg.V/agg.totalWeeks:0;
  var oPerWk=agg.totalWeeks>0?agg.M121/agg.totalWeeks:0;

  function getChoices(targetScore){
    var gap=Math.max(0,targetScore-score.total);
    if(gap<=0)return{gap:0,choices:[],minCount:0,achieved:true};
    var choices=[];
    // 1.출석
    if(score.bd.abs<15)choices.push({icon:"📅",label:"결석 없이 출석",text:"앞으로 결석 없으면",sub:"+"+(15-score.bd.abs)+"점 회복",pts:15-score.bd.abs});
    // 2.지각
    if(score.bd.time<10)choices.push({icon:"⏰",label:"정시 도착",text:"앞으로 지각 없으면",sub:"+"+(10-score.bd.time)+"점 회복",pts:10-score.bd.time});
    // 3.리퍼럴
    if(score.bd.ref<20){
      var nextRate=score.bd.ref===0?0.5:score.bd.ref===5?0.75:score.bd.ref===10?1.0:1.2;
      var need=Math.max(0,Math.ceil(nextRate*totalWeeks)-(agg.RGI+agg.RGO));
      if(need>0){
        var pw=extraWeeks>0?(need/extraWeeks).toFixed(1):"-";
        choices.push({icon:"🤝",label:"리퍼럴",
          text:"<span class='num'>"+need+"건<\/span> 추가 → +5점",
          sub:extraWeeks>0?"남은 "+extraWeeks+"주간 주당 "+pw+"건":"현재 주당 "+rPerWk.toFixed(2)+"건",pts:5});
      }
    }
    // 4.비지터
    if(score.bd.vis<20){
      var steps=[0.1,0.2,0.4,0.6];
      var nextV=steps.find(function(s){return Math.ceil(s*totalWeeks)>agg.V;})||0.6;
      var needV=Math.max(0,Math.ceil(nextV*totalWeeks)-agg.V);
      if(needV>0)choices.push({icon:"👥",label:"비지터",
        text:"<span class='num'>"+needV+"명<\/span> 초대 → +5점",
        sub:"현재 주당 "+vPerWk.toFixed(2)+"명",pts:5});
    }
    // 5.1:1
    if(score.bd.otwone<10){
      var nextO=score.bd.otwone===0?1:2;
      var needO=Math.max(0,Math.ceil(nextO*totalWeeks)-agg.M121);
      if(needO>0){
        var pw2=extraWeeks>0?(needO/extraWeeks).toFixed(1):"-";
        choices.push({icon:"☕",label:"1:1",
          text:"<span class='num'>"+needO+"건<\/span> 더 → +5점",
          sub:extraWeeks>0?"남은 "+extraWeeks+"주간 주당 "+pw2+"건":"현재 주당 "+oPerWk.toFixed(2)+"건",pts:5});
      }
    }
    // 6.감사장
    if(score.bd.tyfcb<15){
      var next=score.bd.tyfcb===0?25000000:score.bd.tyfcb===5?50000000:100000000;
      var needN=Math.max(0,next-agg.N);
      if(needN>0)choices.push({icon:"💰",label:"감사장",
        text:"<span class='num'>"+needN.toLocaleString("ko-KR")+"원<\/span> 더 → +5점",
        sub:"목표 "+next.toLocaleString("ko-KR")+"원",pts:5});
    }
    // 7.교육
    if(score.bd.train<10){
      var needE=score.bd.train===0?Math.max(0,10-agg.O):Math.max(0,20-agg.O);
      if(needE>0)choices.push({icon:"📚",label:"교육점수",
        text:"<span class='num'>"+needE+"점<\/span> 추가 → +5점",
        sub:"포럼·팟캐스트 활용",pts:5});
    }
    // 최소 개수
    var cum=0,minCount=0;
    var sorted=choices.slice().sort(function(a,b){return b.pts-a.pts;});
    for(var i=0;i<sorted.length;i++){cum+=sorted[i].pts;minCount++;if(cum>=gap)break;}
    return{gap:gap,choices:choices,minCount:minCount,achieved:false};
  }

  var fbCls=light==="Grey"?"grey":light==="Red"?"red":light==="Amber"?"amber":"green";
  var paceHtml="<div class='fb-box fb-"+fbCls+"' style='margin-bottom:12px'>" +
    "<div class='fb-title fb-"+fbCls+"'>💡 현재 활동 페이스<\/div>" +
    "<div class='fb-item'><span class='fb-icon'>📈<\/span>" +
    "<span class='fb-text'>주당 평균 — 리퍼럴 <span class='num'>"+rPerWk.toFixed(2)+"건<\/span> / " +
    "비지터 <span class='num'>"+vPerWk.toFixed(2)+"명<\/span> / " +
    "1:1 <span class='num'>"+oPerWk.toFixed(2)+"건<\/span><\/span><\/div>" +
    (extraWeeks>0?"<div class='fb-item'><span class='fb-icon'>⏰<\/span><span class='fb-text'>남은 <b>"+extraWeeks+"주<\/b> 기준 피드백이에요<\/span><\/div>":"") +
    (droppingKeys.length>0?"<div class='fb-item'><span class='fb-icon'>⚠️<\/span><span class='fb-text'>빠지는 달("+droppingKeys.map(keyLabel).join(", ")+") 영향 반영됨<\/span><\/div>":"") +
    "<\/div>";

  function makeFbBox(cls,emoji,title,targetScore){
    var r=getChoices(targetScore);
    if(r.achieved)return "<div class='fb-box "+cls+"'>" +
      "<div class='fb-title "+cls+"'>"+emoji+" "+title+" ✅ 달성!<\/div>" +
      "<div class='fb-item'><span class='fb-icon'>🏆<\/span><span class='fb-text'>현재 페이스 유지하면 달성 가능해요!<\/span><\/div>" +
      "<\/div>";
    var itemsHtml=r.choices.map(function(c){
      return "<div class='fb-item'><span class='fb-icon'>"+c.icon+"<\/span>" +
        "<span class='fb-text'>"+c.label+" "+c.text+(c.sub?" <span class='wk'>("+c.sub+")<\/span>":"")+"<\/span>" +
        "<span class='fb-pts'>+"+c.pts+"점<\/span><\/div>";
    }).join("");
    return "<div class='fb-box "+cls+"'>" +
      "<div class='fb-title "+cls+"'>"+emoji+" "+title+" — "+r.gap+"점 필요<\/div>" +
      "<div class='fb-count'>아래 중 <b>"+r.minCount+"개 이상<\/b> 달성하면 "+title.replace(/\(.*\)/,"").trim()+" 달성!<\/div>" +
      itemsHtml+"<\/div>";
  }

  var fbs="";
  if(light==="Grey"){
    fbs+=makeFbBox("fb-red","🔴","레드(30점)",30);
    fbs+=makeFbBox("fb-amber","🟡","앰버(50점)",50);
    fbs+=makeFbBox("fb-green","🟢","그린(70점)",70);
  } else if(light==="Red"){
    fbs+=makeFbBox("fb-amber","🟡","앰버(50점)",50);
    fbs+=makeFbBox("fb-green","🟢","그린(70점)",70);
  } else if(light==="Amber"){
    fbs+=makeFbBox("fb-green","🟢","그린(70점)",70);
  } else {
    fbs+=makeFbBox("fb-green","🏆","그린 유지!",71);
  }
  document.getElementById("feedback-wrap").innerHTML=paceHtml+fbs;
}

function renderItems(agg,score){
  var items=[
    {name:"출석(결석)",max:15,val:score.bd.abs,hint:agg.A===0?"결석 없음 ✓":"결석 "+agg.A+"회"},
    {name:"지각",max:10,val:score.bd.time,hint:agg.L===0?"지각 없음 ✓":"지각 "+agg.L+"회"},
    {name:"주당 리퍼럴",max:20,val:score.bd.ref,hint:"주당 "+score.rates.rW.toFixed(2)+"건 (목표 1.2건)"},
    {name:"주당 비지터",max:20,val:score.bd.vis,hint:"주당 "+score.rates.vW.toFixed(2)+"명 (목표 0.6명)"},
    {name:"주당 1:1",max:10,val:score.bd.otwone,hint:"주당 "+score.rates.oW.toFixed(2)+"건 (목표 2건)"},
    {name:"감사장",max:15,val:score.bd.tyfcb,hint:won(agg.N)+" (1억 이상→15점)"},
    {name:"교육점수",max:10,val:score.bd.train,hint:agg.O+"점 (20점 이상→만점)"},
  ];
  document.getElementById("items-grid").innerHTML=items.map(function(it){
    var pct=Math.round(it.val/it.max*100);
    var fc=it.val>=it.max?"var(--green)":it.val>0?"var(--amber)":"var(--red)";
    return "<div class='icard'>" +
      "<div class='itop'><div class='iname'>"+it.name+"<\/div><div class='imax'>최대 "+it.max+"점<\/div><\/div>" +
      "<div class='ipts' style='color:"+fc+"'>"+it.val+"<span style='font-size:11px;color:var(--muted)'>점<\/span><\/div>" +
      "<div class='ibar'><div class='ifill' style='width:"+pct+"%;background:"+fc+"'><\/div><\/div>" +
      "<div class='ihint "+(it.val>=it.max?"ok":it.val===0?"bad":"")+"'>"+it.hint+"<\/div>" +
      "<\/div>";
  }).join("");
}

function renderActTable(agg,score,extraWeeks){
  var totalWeeks=agg.totalWeeks+extraWeeks;
  var rows=[
    {name:"출석/결석",cur:"출석 "+agg.P+"회 / 결석 "+agg.A+"회",need:null,std:"결석 0회→15점"},
    {name:"지각",cur:agg.L+"회",need:null,std:"지각 0회→10점"},
    {name:"리퍼럴(T1+T2)",cur:(agg.RGI+agg.RGO)+"건",need:Math.max(0,Math.ceil(1.2*totalWeeks)-(agg.RGI+agg.RGO)),unit:"건",std:"목표 "+Math.ceil(1.2*totalWeeks)+"건 (주당 1.2건)"},
    {name:"비지터",cur:agg.V+"명",need:Math.max(0,Math.ceil(0.6*totalWeeks)-agg.V),unit:"명",std:"목표 "+Math.ceil(0.6*totalWeeks)+"명 (주당 0.6명)"},
    {name:"1:1 원투원",cur:agg.M121+"건",need:Math.max(0,Math.ceil(2*totalWeeks)-agg.M121),unit:"건",std:"목표 "+Math.ceil(2*totalWeeks)+"건 (주당 2건)"},
    {name:"감사장",cur:won(agg.N),need:agg.N>=100000000?0:null,std:"목표 1억 이상"},
    {name:"교육점수",cur:agg.O+"점",need:Math.max(0,20-agg.O),unit:"점",std:"목표 20점"},
  ];
  document.getElementById("act-table").innerHTML="<thead><tr>" +
    "<th>항목<\/th><th>현재 누적<\/th><th>더 필요한 것<\/th><th>그린 기준<\/th>" +
    "<\/tr><\/thead><tbody>" +
    rows.map(function(r){
      var needDisp=r.need===null?"<span class='c-muted'>—<\/span>":
        r.need===0?"<span class='c-ok'>✓ 달성<\/span>":
        "<span class='c-bad'>+"+(r.need)+(r.unit||"")+"<\/span>";
      return "<tr><td class='alabel'>"+r.name+"<\/td>" +
        "<td class='c-cur'>"+r.cur+"<\/td>" +
        "<td>"+needDisp+"<\/td>" +
        "<td class='c-muted' style='font-family:"Noto Sans KR",sans-serif;font-size:11px'>"+r.std+"<\/td><\/tr>";
    }).join("")+"<\/tbody>";
}

function switchView(v){
  if(!MONTHS.length&&v!=="panel"){showToast("먼저 파일을 업로드해 주세요","err");return;}
  document.querySelectorAll(".ntab").forEach(function(t){t.classList.remove("active");});
  document.getElementById("panel-view").style.display=v==="panel"?"block":"none";
  document.getElementById("personal-view").style.display=v==="personal"?"block":"none";
  document.querySelectorAll(".ntab")[v==="panel"?0:1].classList.add("active");
}

function showToast(msg,type){
  type=type||"ok";
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast show "+type;
  setTimeout(function(){t.classList.remove("show");},3500);
}
document.addEventListener("dragover",function(e){e.preventDefault();});
document.addEventListener("drop",function(e){
  e.preventDefault();
  var f=e.dataTransfer.files[0];
  if(f&&(f.name.endsWith(".xlsx")||f.name.endsWith(".xls")))waitXLSX(function(){readExcel(f);});
});
</script>
